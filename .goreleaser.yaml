version: 2
project_name: symphony
dist: tmp/goreleaser

before:
  hooks:
    - go mod download
    - go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
    - make generate
    - go test ./...

builds:
  - id: symphony
    main: ./cmd/symphony
    binary: symphony
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }} -X main.date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: symphony
    ids:
      - symphony
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

brews:
  - name: symphony
    ids:
      - symphony
    repository:
      owner: digitaldrywood
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    url_template: "https://github.com/digitaldrywood/symphony/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: https://github.com/digitaldrywood/symphony
    description: Agent orchestrator for tracker-backed work queues
    license: MIT
    install: |
      bin.install "symphony"
    test: |
      system "#{bin}/symphony", "--version"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
