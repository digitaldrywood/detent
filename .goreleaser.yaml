version: 2
project_name: detent
dist: tmp/goreleaser

before:
  hooks:
    - go mod download
    - go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0
    - make generate
    - go test ./...

builds:
  - id: detent
    main: ./cmd/detent
    binary: detent
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }} -X main.date={{ .Date }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: detent
    ids:
      - detent
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

brews:
  - name: detent
    ids:
      - detent
    repository:
      owner: digitaldrywood
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    url_template: "https://github.com/digitaldrywood/detent/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: https://github.com/digitaldrywood/detent
    description: Agent orchestrator for tracker-backed work queues
    license: MIT
    install: |
      bin.install "detent"
    test: |
      system "#{bin}/detent", "--version"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: minisign
    signature: "${artifact}.minisig"
    args:
      - -S
      - -s
      - "{{ .Env.MINISIGN_KEY_FILE }}"
      - -m
      - "${artifact}"
      - -x
      - "${signature}"
      - -t
      - "detent checksums {{ .Version }}"
    stdin: "{{ .Env.MINISIGN_PASSWORD }}"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
