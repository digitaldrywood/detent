name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Cache golangci-lint
        id: golangci-lint-cache
        uses: actions/cache@v5
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-go1.26.4-v2.1.6

      - name: Install golangci-lint
        if: steps.golangci-lint-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Cache golangci-lint analysis
        uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-analysis-${{ runner.os }}-${{ hashFiles('.golangci.yml', 'go.sum') }}
          restore-keys: |
            golangci-lint-analysis-${{ runner.os }}-

      - name: Run golangci-lint
        run: ~/go/bin/golangci-lint run --timeout=5m

  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            race: true
          - os: macos-latest
            race: true
          - os: windows-latest
            race: true
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        if: matrix.race
        run: go test -race ./...

  test-cover:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Check coverage
        run: make test-cover

  browser-visual:
    name: Browser Visual
    runs-on: ubuntu-latest
    steps:
      - name: Decide browser visual policy
        id: policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          is_visual_input() {
            case "$1" in
              .github/workflows/ci.yml|package.json|package-lock.json|playwright.config.js|tests/visual/*|static/*|internal/web/*|internal/cli/dev_runtime*.go|internal/devruntime/*|*.templ|README.md|CONTRIBUTING.md|docs/*)
                return 0
                ;;
            esac
            return 1
          }

          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "visual=true" >> "$GITHUB_OUTPUT"
            echo "reason=push to main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          visual=false
          reason="no UI-sensitive PR paths changed"
          while IFS=$'\t' read -r path previous_path status; do
            if is_visual_input "$path" || is_visual_input "$previous_path"; then
              visual=true
              reason="UI-sensitive PR change: $path"
              break
            fi
            if [ "$status" = "removed" ] || [ "$status" = "renamed" ]; then
              if is_visual_input "$path" || is_visual_input "$previous_path"; then
                visual=true
                reason="UI-sensitive PR change: $path"
                break
              fi
            fi
          done < <(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[] | [.filename, (.previous_filename // ""), .status] | @tsv')

          echo "visual=$visual" >> "$GITHUB_OUTPUT"
          echo "reason=$reason" >> "$GITHUB_OUTPUT"

      - name: Skip browser visual gate
        if: steps.policy.outputs.visual != 'true'
        run: |
          echo "Browser visual gate skipped: ${{ steps.policy.outputs.reason }}."

      - uses: actions/checkout@v5
        if: steps.policy.outputs.visual == 'true'

      - uses: actions/setup-go@v6
        if: steps.policy.outputs.visual == 'true'
        with:
          go-version: '1.26.4'
          cache: true

      - uses: actions/setup-node@v6
        if: steps.policy.outputs.visual == 'true'
        with:
          node-version: '24'
          cache: npm

      - name: Install Node dependencies
        if: steps.policy.outputs.visual == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.policy.outputs.visual == 'true'
        run: npx playwright install --with-deps chromium

      - name: Build Detent visual test binary
        if: steps.policy.outputs.visual == 'true'
        run: |
          mkdir -p tmp
          go build -o tmp/detent ./cmd/detent

      - name: Run browser visual gate
        if: steps.policy.outputs.visual == 'true'
        env:
          DETENT_BINARY: ${{ github.workspace }}/tmp/detent
        run: npm run test:visual

      - name: Upload browser visual evidence
        if: always() && steps.policy.outputs.visual == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: browser-visual-evidence
          path: tmp/playwright-evidence
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload browser visual failure artifacts
        if: failure() && steps.policy.outputs.visual == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: browser-visual-failure-artifacts
          path: |
            tmp/playwright-report
            tmp/playwright-results
          if-no-files-found: ignore
          retention-days: 14

  windows-core:
    name: Windows Core
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run non-agent core tests
        run: go test ./cmd/detent ./internal/config ./internal/config/global ./internal/store ./internal/web ./internal/tui ./internal/orchestrator ./internal/cli

      - name: Build command
        run: go build ./cmd/detent

  installer-smoke:
    name: Installer Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Smoke release installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export DETENT_INSTALL_DIR="$RUNNER_TEMP/detent/bin"
          export DETENT_STATE_DIR="$RUNNER_TEMP/detent/state"
          export DETENT_INSTALL_LOCK="$DETENT_STATE_DIR/install.lock"
          export DETENT_INSTALL_MODE=release

          output="$(sh ./install.sh)"
          printf '%s\n' "$output"
          grep -F "Verified checksum for detent_" <<< "$output"
          grep -F "Installed Detent at $DETENT_INSTALL_DIR/detent" <<< "$output"
          grep -F "Add $DETENT_INSTALL_DIR to PATH before running detent" <<< "$output"

          test -x "$DETENT_INSTALL_DIR/detent"
          grep -F "binary=$DETENT_INSTALL_DIR/detent" "$DETENT_INSTALL_LOCK"
          grep -F "installed_at=" "$DETENT_INSTALL_LOCK"

          "$DETENT_INSTALL_DIR/detent" version
          "$DETENT_INSTALL_DIR/detent" update --check --json > "$RUNNER_TEMP/detent/update-check.json"
          "$DETENT_INSTALL_DIR/detent" update --yes --json > "$RUNNER_TEMP/detent/update-yes.json"
          jq -e '.install_source == "release" and .action == "up_to_date" and .update_available == false' "$RUNNER_TEMP/detent/update-check.json"
          jq -e '.install_source == "release" and .action == "up_to_date" and .update_available == false' "$RUNNER_TEMP/detent/update-yes.json"

      - name: Smoke release installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP 'detent'
          $env:DETENT_INSTALL_DIR = Join-Path $root 'bin'
          $env:DETENT_STATE_DIR = Join-Path $root 'state'
          $env:DETENT_INSTALL_LOCK = Join-Path $env:DETENT_STATE_DIR 'install.lock'
          $env:DETENT_INSTALL_MODE = 'release'

          $output = powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\install.ps1 2>&1
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { Write-Host $_ }
          if ($exitCode -ne 0) {
            throw "install.ps1 failed with exit code $exitCode"
          }
          if (-not ($output -match 'Verified checksum for detent_.*_windows_.*\.zip')) {
            throw 'install.ps1 did not report checksum verification'
          }

          $binary = Join-Path $env:DETENT_INSTALL_DIR 'detent.exe'
          if (-not ($output -match [regex]::Escape("Installed Detent at $binary"))) {
            throw 'install.ps1 did not report the requested install directory'
          }
          if (-not ($output -match [regex]::Escape("Added $env:DETENT_INSTALL_DIR to the user PATH"))) {
            throw 'install.ps1 did not report PATH guidance'
          }
          if (-not (Test-Path -LiteralPath $binary -PathType Leaf)) {
            throw "detent.exe was not installed at $binary"
          }

          $lock = Get-Content -LiteralPath $env:DETENT_INSTALL_LOCK -Raw
          if ($lock -notmatch [regex]::Escape("binary=$binary")) {
            throw 'install lock did not record the installed binary path'
          }
          if ($lock -notmatch 'installed_at=') {
            throw 'install lock did not record installed_at'
          }

          & $binary version
          $checkRaw = & $binary update --check --json
          if ($LASTEXITCODE -ne 0) {
            throw "detent update --check failed with exit code $LASTEXITCODE"
          }
          $yesRaw = & $binary update --yes --json
          if ($LASTEXITCODE -ne 0) {
            throw "detent update --yes failed with exit code $LASTEXITCODE"
          }
          $checkJSON = $checkRaw -join "`n"
          $yesJSON = $yesRaw -join "`n"
          $check = $checkJSON | ConvertFrom-Json
          $yes = $yesJSON | ConvertFrom-Json
          if ($check.install_source -ne 'release' -or $check.action -ne 'up_to_date' -or $check.update_available) {
            throw "unexpected update --check status: $checkJSON"
          }
          if ($yes.install_source -ne 'release' -or $yes.action -ne 'up_to_date' -or $yes.update_available) {
            throw "unexpected update --yes status: $yesJSON"
          }

  goreleaser-snapshot:
    name: GoReleaser Snapshot
    runs-on: ubuntu-latest
    needs: [lint, verify, test-cover, browser-visual, windows-core, installer-smoke]
    steps:
      - name: Decide release packaging policy
        id: policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "snapshot=true" >> "$GITHUB_OUTPUT"
            echo "reason=push to main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          release_relevant=false
          is_release_input() {
            case "$1" in
              .goreleaser.yaml|.github/workflows/ci.yml|.github/workflows/release.yml|Makefile|go.mod|go.sum|detent-release.pub|install.sh|install.ps1)
                return 0
                ;;
            esac
            return 1
          }

          while IFS= read -r file; do
            path="$(jq -r '.[0]' <<< "$file")"
            previous_path="$(jq -r '.[1]' <<< "$file")"
            status="$(jq -r '.[2]' <<< "$file")"

            if is_release_input "$path" || is_release_input "$previous_path"; then
              release_relevant=true
              break
            fi

            if [ "$status" = "removed" ] || [ "$status" = "renamed" ]; then
              case "$path" in
                README.md|LICENSE)
                  release_relevant=true
                  break
                  ;;
              esac
              case "$previous_path" in
                README.md|LICENSE)
                  release_relevant=true
                  break
                  ;;
              esac
            fi
          done < <(gh api "repos/$REPOSITORY/pulls/$PR_NUMBER/files" --paginate --jq '.[] | [.filename, (.previous_filename // ""), .status] | @json')

          if [ "$release_relevant" = true ]; then
            echo "snapshot=true" >> "$GITHUB_OUTPUT"
            echo "reason=release-relevant PR change" >> "$GITHUB_OUTPUT"
          else
            echo "snapshot=false" >> "$GITHUB_OUTPUT"
            echo "reason=ordinary PR change" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.policy.outputs.snapshot == 'true'
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        if: steps.policy.outputs.snapshot == 'true'
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install minisign
        if: steps.policy.outputs.snapshot == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Prepare minisign snapshot key
        if: steps.policy.outputs.snapshot == 'true'
        run: minisign -G -W -s "$RUNNER_TEMP/detent-minisign.key" -p "$RUNNER_TEMP/detent-minisign.pub"

      - name: Run GoReleaser snapshot
        if: steps.policy.outputs.snapshot == 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINISIGN_KEY_FILE: ${{ runner.temp }}/detent-minisign.key
          MINISIGN_PASSWORD: ""

      - name: Skip GoReleaser snapshot
        if: steps.policy.outputs.snapshot != 'true'
        run: |
          echo "GoReleaser snapshot skipped: ${{ steps.policy.outputs.reason }}."
