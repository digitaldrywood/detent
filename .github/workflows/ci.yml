name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  schedule:
    - cron: '27 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Cache golangci-lint
        id: golangci-lint-cache
        uses: actions/cache@v5
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-go1.26.4-v2.1.6

      - name: Install golangci-lint
        if: steps.golangci-lint-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Cache golangci-lint analysis
        uses: actions/cache@v5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-analysis-${{ runner.os }}-${{ hashFiles('.golangci.yml', 'go.sum') }}
          restore-keys: |
            golangci-lint-analysis-${{ runner.os }}-

      - name: Run golangci-lint
        run: ~/go/bin/golangci-lint run --timeout=5m

  verify:
    name: Verify (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

  test-cover:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Check coverage
        run: make test-cover

  browser-visual:
    name: Browser Visual
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Detect visual-sensitive changes
        id: visual-changes
        shell: bash
        run: |
          set -euo pipefail
          run_visual=true
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
            run_visual=false
            while IFS= read -r changed_file; do
              case "$changed_file" in
                .github/workflows/ci.yml|.templui.json|go.mod|go.sum|package.json|package-lock.json|playwright.config.js|README.md|docs/ONBOARDING.md|static/*|tests/visual/*|internal/web/*|internal/cli/dev_runtime*.go|internal/devruntime/*)
                  run_visual=true
                  break
                  ;;
              esac
            done < <(git diff --name-only "origin/$GITHUB_BASE_REF...HEAD")
          fi
          echo "run_visual=$run_visual" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        if: steps.visual-changes.outputs.run_visual == 'true'
        with:
          node-version: '24'
          cache: npm

      - name: Install Node dependencies
        if: steps.visual-changes.outputs.run_visual == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.visual-changes.outputs.run_visual == 'true'
        run: npx playwright install --with-deps chromium

      - name: Install visual build generators
        if: steps.visual-changes.outputs.run_visual == 'true'
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest

      - name: Build Detent visual test binary
        if: steps.visual-changes.outputs.run_visual == 'true'
        run: make build

      - name: Run full browser visual gate
        if: steps.visual-changes.outputs.run_visual == 'true'
        env:
          DETENT_BINARY: ${{ github.workspace }}/tmp/detent
        run: npm run test:visual

      - name: Run browser smoke gate
        if: steps.visual-changes.outputs.run_visual != 'true'
        run: |
          set -euo pipefail
          mkdir -p tmp
          go build -o tmp/detent ./cmd/detent
          tmp/detent --help

      - name: Upload browser visual evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-visual-evidence
          path: tmp/playwright-evidence
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload browser visual failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-visual-failure-artifacts
          path: |
            tmp/playwright-report
            tmp/playwright-results
          if-no-files-found: ignore
          retention-days: 14

  portability-verify:
    if: ${{ github.event_name != 'pull_request' }}
    name: Portability Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

  windows-core:
    if: ${{ github.event_name != 'pull_request' }}
    name: Windows Core
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run non-agent core tests
        run: go test ./cmd/detent ./internal/config ./internal/config/global ./internal/store ./internal/web ./internal/tui ./internal/orchestrator ./internal/cli

      - name: Build command
        run: go build ./cmd/detent

  installer-smoke:
    if: ${{ github.event_name != 'pull_request' }}
    name: Installer Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release installer version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)"
          if [ -z "$tag" ]; then
            echo "Could not resolve latest Detent release tag" >&2
            exit 1
          fi
          echo "DETENT_VERSION=$tag" >> "$GITHUB_ENV"

      - name: Smoke release installer
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export DETENT_INSTALL_DIR="$RUNNER_TEMP/detent/bin"
          export DETENT_STATE_DIR="$RUNNER_TEMP/detent/state"
          export DETENT_INSTALL_LOCK="$DETENT_STATE_DIR/install.lock"
          export DETENT_INSTALL_MODE=release

          output="$(sh ./install.sh 2>&1)"
          printf '%s\n' "$output"
          if grep -Fq "falling back to go install" <<< "$output"; then
            echo "Release installer fell back to go install" >&2
            exit 1
          fi
          grep -F "Verified checksum for detent_" <<< "$output"
          grep -F "Installed Detent at $DETENT_INSTALL_DIR/detent" <<< "$output"
          grep -F "Add $DETENT_INSTALL_DIR to PATH before running detent" <<< "$output"

          test -x "$DETENT_INSTALL_DIR/detent"
          grep -F "binary=$DETENT_INSTALL_DIR/detent" "$DETENT_INSTALL_LOCK"
          grep -F "installed_at=" "$DETENT_INSTALL_LOCK"

          "$DETENT_INSTALL_DIR/detent" version

      - name: Smoke release installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP 'detent'
          $env:DETENT_INSTALL_DIR = Join-Path $root 'bin'
          $env:DETENT_STATE_DIR = Join-Path $root 'state'
          $env:DETENT_INSTALL_LOCK = Join-Path $env:DETENT_STATE_DIR 'install.lock'
          $env:DETENT_INSTALL_MODE = 'release'

          $output = powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\install.ps1 2>&1
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { Write-Host $_ }
          if ($exitCode -ne 0) {
            throw "install.ps1 failed with exit code $exitCode"
          }
          if ($output -match 'falling back to go install') {
            throw 'Release installer fell back to go install'
          }
          if (-not ($output -match 'Verified checksum for detent_.*_windows_.*\.zip')) {
            throw 'install.ps1 did not report checksum verification'
          }

          $binary = Join-Path $env:DETENT_INSTALL_DIR 'detent.exe'
          if (-not ($output -match [regex]::Escape("Installed Detent at $binary"))) {
            throw 'install.ps1 did not report the requested install directory'
          }
          if (-not ($output -match [regex]::Escape("Added $env:DETENT_INSTALL_DIR to the user PATH"))) {
            throw 'install.ps1 did not report PATH guidance'
          }
          if (-not (Test-Path -LiteralPath $binary -PathType Leaf)) {
            throw "detent.exe was not installed at $binary"
          }

          $lock = Get-Content -LiteralPath $env:DETENT_INSTALL_LOCK -Raw
          if ($lock -notmatch [regex]::Escape("binary=$binary")) {
            throw 'install lock did not record the installed binary path'
          }
          if ($lock -notmatch 'installed_at=') {
            throw 'install lock did not record installed_at'
          }

          & $binary version

  goreleaser-snapshot:
    if: ${{ github.event_name != 'pull_request' }}
    name: GoReleaser Snapshot
    runs-on: ubuntu-latest
    needs: [lint, verify, test-cover, browser-visual, portability-verify, windows-core, installer-smoke]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Prepare minisign snapshot key
        run: minisign -G -W -s "$RUNNER_TEMP/detent-minisign.key" -p "$RUNNER_TEMP/detent-minisign.pub"

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINISIGN_KEY_FILE: ${{ runner.temp }}/detent-minisign.key
          MINISIGN_PASSWORD: ""
