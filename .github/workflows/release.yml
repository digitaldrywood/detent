name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Verify tag points at main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          main_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_sha" ]; then
            echo "Release tags must point at origin/main ($main_sha); got $GITHUB_SHA."
            exit 1
          fi

      - name: Install minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y minisign

      - name: Prepare minisign key
        run: |
          if [ -z "$MINISIGN_KEY" ]; then
            echo "MINISIGN_KEY secret is required."
            exit 1
          fi
          if [ -z "$MINISIGN_PASSWORD" ]; then
            echo "MINISIGN_PASSWORD secret is required."
            exit 1
          fi
          key_file="$RUNNER_TEMP/detent-minisign.key"
          printf '%s' "$MINISIGN_KEY" > "$key_file"
          chmod 600 "$key_file"
        env:
          MINISIGN_KEY: ${{ secrets.MINISIGN_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MINISIGN_KEY_FILE: ${{ runner.temp }}/detent-minisign.key
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
